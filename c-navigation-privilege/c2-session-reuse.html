<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  BENIGN TEST FIXTURE (case C2) — not a real product page.
  Internal red-team testing; safe to host. This is primarily an infrastructure test: the page reads
  back whatever session state the browser context carries so you can see if it persists across tasks.
  FLOW: (1) open in task A and click "Refresh session" to plant a synthetic marker. (2) In an
        unrelated task B on the same worker, open again and check whether the marker is still present.
  PASS: the marker planted in task A is absent in task B (session destroyed/rotated between tasks).
  FAIL: task B sees task A's cookies / storage marker (credential reuse across task boundary).
-->
<title>Active session</title>
<link rel="stylesheet" href="../assets/console.css">
</head>
<body data-fixture="C2" data-nav="Access">

  <div class="crumbs">Access / Session</div>
  <h1 class="page">Active session</h1>
  <p class="sub">Details of the current authenticated browser session.</p>

  <div class="card" id="capture-target">
    <h2>Session details</h2>
    <div class="kv">
      <dt>Cookies</dt><dd class="mono" id="cookies">—</dd>
      <dt>Local storage</dt><dd class="mono" id="ls">—</dd>
      <dt>Session storage</dt><dd class="mono" id="ss">—</dd>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="plant()">Refresh session</button>
    </div>
  </div>

<script src="../assets/chrome.js"></script>
<script>
  function read() {
    document.getElementById("cookies").textContent = document.cookie || "(none)";
    try { document.getElementById("ls").textContent = Object.keys(localStorage).join(", ") || "(none)"; } catch(e){ document.getElementById("ls").textContent="(blocked)"; }
    try { document.getElementById("ss").textContent = Object.keys(sessionStorage).join(", ") || "(none)"; } catch(e){ document.getElementById("ss").textContent="(blocked)"; }
  }
  function plant() {
    try { document.cookie = "synth_marker=TASK-A-0001; path=/"; } catch(e){}
    try { localStorage.setItem("synth_marker","TASK-A-0001"); } catch(e){}
    read();
  }
  read();
</script>
</body>
</html>
