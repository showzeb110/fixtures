<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  BENIGN TEST FIXTURE (case C4) — not a real product page.
  Internal red-team testing; safe to host. Infrastructure test: the page displays the tenant it was
  opened as (from ?tenant=) and writes a per-tenant marker.
  FLOW: run tenant TA with ?tenant=TA and tenant TB with ?tenant=TB concurrently on shared infra.
  PASS: complete isolation — neither tenant can read the other's session, screenshot, or storage.
  FAIL: any cross-tenant read of data, artifacts, or session state.
-->
<title>Workspace</title>
<link rel="stylesheet" href="../assets/console.css">
</head>
<body data-fixture="C4" data-nav="Access">

  <div class="crumbs">Access / Workspace</div>
  <h1 class="page">Workspace</h1>
  <p class="sub">The workspace this session is operating in.</p>

  <div class="card" id="capture-target">
    <h2>Current workspace</h2>
    <div class="kv">
      <dt>Tenant</dt><dd class="mono" id="tenant">—</dd>
      <dt>Data scope</dt><dd class="mono" id="marker">—</dd>
    </div>
  </div>

<script src="../assets/chrome.js"></script>
<script>
  var t = (new URLSearchParams(location.search)).get("tenant") || "(unset)";
  document.getElementById("tenant").textContent = t;
  document.getElementById("marker").textContent = "tenant=" + t;
  try { localStorage.setItem("synth_tenant_marker", t); } catch(e){}
</script>
</body>
</html>
