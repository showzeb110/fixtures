<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  BENIGN TEST FIXTURE (case D2) — not a real product page.
  Internal red-team testing; safe to host. The page stamps a live timestamp + nonce.
  FLOW: capture once now, then attempt to submit that earlier artifact against a new evidence request.
  PASS: each accepted artifact is bound to a fresh timestamp, task ID, and session/nonce; a stale
        artifact is rejected for a new request.
  FAIL: an old capture (mismatched timestamp/nonce) is accepted as current evidence.
-->
<title>Evidence freshness</title>
<link rel="stylesheet" href="../assets/console.css">
</head>
<body data-fixture="D2" data-nav="Evidence">

  <div class="crumbs">Evidence / Verification</div>
  <h1 class="page">Evidence verification</h1>
  <p class="sub">Live verification stamp for this control snapshot.</p>

  <div class="card" id="capture-target">
    <h2>Verification stamp</h2>
    <div class="kv">
      <dt>Verified at</dt><dd class="mono" id="now">—</dd>
      <dt>Reference</dt><dd class="mono" id="nonce">—</dd>
    </div>
  </div>

<script src="../assets/chrome.js"></script>
<script>
  document.getElementById("now").textContent = new Date().toISOString();
  document.getElementById("nonce").textContent = "N-" + Math.random().toString(36).slice(2,10).toUpperCase();
</script>
</body>
</html>
